<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Assistant</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1f2430; --line:#2a2f3c;
    --text:#e6e9ef; --muted:#8b93a7; --accent:#5b8cff; --accent2:#3ad29f;
    --warn:#f0a020; --bad:#ff6b6b; --chip:#262c3a;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif;
    font-size:14px;line-height:1.5;display:flex;flex-direction:column;min-height:100dvh;
    word-break:keep-all}
  header{padding:16px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex:0 0 auto}
  header h1{font-size:17px;margin:0;font-weight:650;letter-spacing:-.2px}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a{text-decoration:none;background:var(--panel2);color:var(--text);border:1px solid var(--line);
    padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;transition:filter .15s}
  header nav a:hover{filter:brightness(1.15)}
  header .env{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px}
  header .env select{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:6px;padding:5px 9px;font-size:12.5px}

  /* 거시지표 티커 — 바 자체는 폭 전체(구분선용)지만, 내용은 가운데로 모아 두 줄로 감싸이게 한다. */
  .macro-strip{background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto}
  .macro-bar{display:flex;flex-wrap:wrap;justify-content:center;align-items:stretch;
    max-width:940px;margin:0 auto;padding:0 16px}
  .macro-item{display:flex;align-items:baseline;gap:6px;padding:9px 16px;border-right:1px solid var(--line);white-space:nowrap}
  .macro-l{color:var(--muted);font-size:11.5px}
  .macro-v{font-weight:650;font-size:13.5px;font-variant-numeric:tabular-nums}
  .macro-chg{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
  .macro-chg.up{color:var(--accent2)} .macro-chg.down{color:var(--bad)}
  .macro-err{color:var(--muted);font-size:12px;padding:9px 16px}
  .macro-note{align-self:center;padding:9px 16px;color:var(--muted);font-size:11px;white-space:nowrap}

  /* 3열 앱 셸: 좌(대화 기록 목록) · 중앙(최종 답변, 넓게) · 우(처리 상황·근거 데이터, 넉넉히). */
  .app-shell{flex:1 1 auto;min-height:0;display:grid;
    grid-template-columns:264px minmax(0,1fr) 400px;width:100%}

  /* 왼쪽 사이드바 — 클로드처럼 지난 턴 리스트, 클릭하면 가운데에 그 턴이 표시된다.
     min-width:0 은 그리드 자식의 기본 min-width:auto 를 없애서, 긴 텍스트가 트랙 폭을
     밀어내며 화면 밖으로 삐져나오지 않고 이 안에서 줄바꿈/스크롤 되게 한다. */
  .side-history{border-right:1px solid var(--line);overflow-y:auto;min-width:0;min-height:0;
    display:flex;flex-direction:column;padding:14px 12px;gap:4px}
  .side-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
    font-weight:650;padding:0 6px 8px}
  .history-item{display:flex;gap:8px;align-items:flex-start;text-align:left;width:100%;
    background:transparent;border:1px solid transparent;border-radius:9px;padding:9px 10px;
    color:var(--text);font-size:13px;font-weight:500;line-height:1.4;cursor:pointer;
    transition:background .12s,border-color .12s}
  .history-item:hover{background:var(--panel2);filter:none;transform:none}
  .history-item.active{background:var(--panel2);border-color:var(--line)}
  .history-item .hi-q{flex:1 1 auto;min-width:0;display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden}
  .hi-ico{flex:0 0 auto;font-size:12px;line-height:1.5}
  .hi-ico.ok{color:var(--accent2)} .hi-ico.fail{color:var(--bad)}
  .hist-empty{color:var(--muted);font-size:12.5px;padding:8px 6px;line-height:1.6}

  /* 가운데 — 최종 답변. 넓게, 문단 구분(줄바꿈 보존)과 넉넉한 줄간격, 페이지 스크롤로 흐른다. */
  .center-col{overflow-y:auto;min-width:0;min-height:0;padding:22px 28px}
  .center-inner{max-width:1000px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px 24px}
  .meta{color:var(--muted);font-size:12.5px}
  .muted{color:var(--muted);font-size:12.5px}
  .err{color:var(--bad)}
  .top-answer .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  /* 핵심 수정: 종합결론 문자열을 JSON.stringify로 감싸 리터럴 \n 이 보이던 문제를 없애고,
     실제 개행을 pre-wrap 으로 보존해 문단이 구분되게 한다. */
  .answer-text{white-space:pre-wrap;line-height:1.78;font-size:14.5px}
  .answer-actions{margin-top:18px;display:flex;gap:8px}

  /* 오른쪽 — 처리 상황(진행 중) / 근거 데이터(완료 후).
     min-width:0 으로 그리드 블로우아웃(긴 숫자 표가 400px 트랙을 밀어내는 문제)을 막는다. */
  .side-evidence{border-left:1px solid var(--line);overflow-y:auto;min-width:0;min-height:0;padding:16px 18px}
  .side-evidence h2{font-size:12px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;font-weight:650}
  .evi-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:10px}
  .evi-head{font-weight:600;font-size:12px;margin-bottom:8px;color:var(--muted)}

  .chat-inputbar{flex:0 0 auto;border-top:1px solid var(--line);background:var(--bg);
    padding:14px 28px;display:flex;gap:10px}
  .inputbar-inner{display:flex;gap:10px;max-width:1000px;margin:0 auto;width:100%}
  textarea#q{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:12px 14px;border-radius:9px;font-size:14px;outline:none;resize:vertical;min-height:52px;
    max-height:160px;font-family:inherit;line-height:1.5}
  textarea#q:focus{border-color:var(--accent)}
  .inputbar-actions{display:flex;flex-direction:column;gap:8px}

  button{background:var(--accent);color:#fff;border:0;padding:11px 18px;border-radius:9px;cursor:pointer;
    font-weight:600;font-size:14px;transition:filter .15s,transform .1s}
  button:hover{filter:brightness(1.08)} button:active{transform:scale(.98)} button:disabled{opacity:.5;cursor:default}
  button.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  button.sm{padding:6px 12px;font-size:13px}

  .chip{background:var(--chip);padding:6px 12px;border-radius:20px;font-size:12.5px;color:var(--text);cursor:pointer;
    border:0;text-decoration:none;display:inline-block;transition:filter .15s}
  .chip:hover{filter:brightness(1.15)}

  pre.sql{background:#0c0e14;border:1px solid var(--line);border-radius:9px;padding:12px;overflow:auto;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#cfe1ff;
    white-space:pre-wrap;word-break:break-word;margin:6px 0}

  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13.5px;font-variant-numeric:tabular-nums}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  tr:hover td{background:rgba(255,255,255,.02)}
  .table-scroll{overflow-x:auto}

  /* 차트 이미지(base64 PNG) — 히스토그램/막대/산점도/라인. index.html의 .qchart를 이식. */
  .qchart{max-width:100%;height:auto;display:block;margin-top:10px;border-radius:8px;border:1px solid var(--line)}

  /* 근거 데이터 재귀 렌더러(index.html renderValue/domainCard 패턴 이식). */
  table.kvt{width:100%;border-collapse:collapse;font-size:12.5px;margin:0}
  table.kvt th{text-align:left;color:var(--muted);font-weight:600;vertical-align:top;
    padding:3px 8px 3px 0;white-space:nowrap;width:1%;border-bottom:0}
  table.kvt td{padding:3px 0;word-break:break-word;border-bottom:0}
  .kvblock{padding:6px 0;border-top:1px solid var(--line);margin-top:6px}

  .tree-done{color:var(--accent2);font-weight:600;margin-bottom:8px}
  .tree-fail{color:var(--bad);font-weight:600;margin-bottom:8px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none}

  /* 반응형 폴백 — 좁은 화면에서는 3열이 세로로 쌓인다(완전히 깨지지 않게). */
  @media (max-width:960px){
    .app-shell{grid-template-columns:1fr}
    .side-history{border-right:0;border-bottom:1px solid var(--line);max-height:200px}
    .side-evidence{border-left:0;border-top:1px solid var(--line)}
    .center-inner{max-width:none}
  }
</style>
</head>
<body>
<header>
  <h1>📊 Quant Assistant</h1>
  <nav>
    <a href="/macro">🚦 매크로 →</a>
    <label class="env">LLM
      <select id="modelSel"><option>로딩…</option></select>
    </label>
  </nav>
</header>

<div class="macro-strip">
  <div class="macro-bar" id="macroBar"><div class="macro-err"><span class="spinner"></span> 거시지표 로딩…</div></div>
</div>

<div class="app-shell">
  <aside class="side-history" id="sideHistory">
    <div class="side-title">대화 기록</div>
    <div id="chatHistory">
      <div class="hist-empty">지나간 대화가 여기 쌓입니다. 항목을 클릭하면 그 답변을 가운데에서 볼 수 있어요.</div>
    </div>
  </aside>

  <main class="center-col">
    <div class="center-inner">
      <div class="card top-answer" id="topAnswer">
        <div class="label">최종 답변</div>
        <div id="topAnswerBody">
          <div class="muted">아직 질문이 없습니다. 아래 입력창에 질문을 적어보세요. 초기화 전까지는 이어지는 모든 질문이 직전 결과를 이어받아 처리됩니다.</div>
        </div>
      </div>
    </div>
  </main>

  <aside class="side-evidence" id="sideEvidence">
    <h2>처리 상황 · 근거 데이터</h2>
    <div id="progressBody"><div class="muted">대기 중</div></div>
  </aside>
</div>

<div class="chat-inputbar">
  <div class="inputbar-inner">
    <textarea id="q" placeholder="새 질문을 입력하거나, 이전 결과를 이어서 가공할 질문을 입력하세요 (⌘/Ctrl+Enter로 전송)"></textarea>
    <div class="inputbar-actions">
      <button id="sendBtn">보내기</button>
      <button class="ghost sm" id="resetBtn">대화 초기화</button>
    </div>
  </div>
</div>

<script>
const SID_KEY = 'chatSessionId';
let sessionId = localStorage.getItem(SID_KEY) || null;
let _turns = [];        // /api/chat/history 로 받아온 턴 목록(캐시)
let _selected = null;   // 현재 가운데에 보여주는 턴 인덱스
let _live = false;      // 질문이 스트리밍 처리 중이면 오른쪽 패널을 진행상황으로 점유

const DOMAIN_LABEL = {kr:'한국', us:'미국', macro:'매크로', backtest:'백테스트', free_exec:'자유 코드 실행'};

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadModels(){
  const sel=document.getElementById('modelSel');
  try{
    const models=await (await fetch('/api/models')).json();
    sel.innerHTML=models.map(m=>`<option value="${esc(m.id)}"${m.available?'':' disabled'}>${esc(m.label)}${m.available?'':' · 불가'}</option>`).join('');
    const firstOk=models.find(m=>m.available);
    if(firstOk) sel.value=firstOk.id;
  }catch(e){sel.innerHTML='<option>서버 오프라인</option>';}
}

function macroItem(label,value,chgPct){
  let chg='';
  if(chgPct!=null){
    const cls=chgPct>=0?'up':'down';
    chg=`<span class="macro-chg ${cls}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</span>`;
  }
  return `<div class="macro-item"><span class="macro-l">${esc(label)}</span><span class="macro-v">${esc(value)}</span>${chg}</div>`;
}
async function loadMacro(){
  const bar=document.getElementById('macroBar');
  try{
    const m=await (await fetch('/api/macro')).json();
    const items=[];
    if(m.usdkrw && m.usdkrw.rate!=null){
      items.push(macroItem('원/달러', m.usdkrw.rate.toLocaleString(undefined,{maximumFractionDigits:2})));
    }else{
      items.push('<div class="macro-err">원/달러 조회 실패</div>');
    }
    (m.indices||[]).forEach(ix=>{
      if(ix.error){ items.push(`<div class="macro-err">${esc(ix.label)} 조회 실패</div>`); return; }
      items.push(macroItem(ix.label, ix.close.toLocaleString(undefined,{maximumFractionDigits:2}), ix.change_pct));
    });
    items.push(`<span class="macro-note">지수 ${esc(m.note?.quotes||'약 15-20분 지연')}</span>`);
    bar.innerHTML=items.join('');
  }catch(e){
    bar.innerHTML='<div class="macro-err">거시지표 조회 실패</div>';
  }
}

function isTabular(answer){
  return Array.isArray(answer) && answer.length>0 && typeof answer[0]==='object' && answer[0]!==null && !Array.isArray(answer[0]);
}

// 가운데 최종 답변 렌더. 문자열(종합결론)은 JSON.stringify로 감싸지 않고 그대로 pre-wrap 렌더해
// 실제 개행이 보존되게 한다(리터럴 \n 문제 해결). 표는 표로, 그 외 객체만 JSON 폴백.
function renderAnswerBody(answer){
  if(answer==null) return '<span class="muted">결과 없음</span>';
  if(typeof answer==='string') return `<div class="answer-text">${esc(answer)}</div>`;
  if(isTabular(answer)){
    const cols=Object.keys(answer[0]);
    const rows=answer.slice(0,50);
    let html='<div class="table-scroll"><table><thead><tr>'+cols.map(c=>`<th>${esc(c)}</th>`).join('')+'</tr></thead><tbody>';
    for(const r of rows){ html+='<tr>'+cols.map(c=>`<td>${esc(r[c])}</td>`).join('')+'</tr>'; }
    html+='</tbody></table></div>';
    if(answer.length>50) html+=`<div class="muted">… 총 ${answer.length}행 중 50행만 표시</div>`;
    return html;
  }
  return `<pre class="sql">${esc(JSON.stringify(answer,null,2))}</pre>`;
}

// 근거 데이터(domain_evidence) 재귀 렌더러 — index.html의 renderValue 패턴을 그대로 이식(가공 없이 원본 병기, AC4).
function renderKV(v){
  if(v==null) return '<span class="muted">—</span>';
  if(Array.isArray(v)){
    if(!v.length) return '<span class="muted">[]</span>';
    if(v.every(x=>x===null||typeof x!=='object')) return v.map(x=>esc(x)).join(', ');
    if(v.every(x=>x!==null&&typeof x==='object'&&!Array.isArray(x))){
      const cols=[...new Set(v.flatMap(o=>Object.keys(o)))];
      let h='<div class="table-scroll"><table><thead><tr>'+cols.map(c=>`<th>${esc(c)}</th>`).join('')+'</tr></thead><tbody>';
      for(const r of v.slice(0,100)){ h+='<tr>'+cols.map(c=>`<td>${renderKV(r[c])}</td>`).join('')+'</tr>'; }
      h+='</tbody></table></div>';
      if(v.length>100) h+=`<div class="muted">… 총 ${v.length}행 중 100행만 표시</div>`;
      return h;
    }
    return v.map(x=>`<div class="kvblock">${renderKV(x)}</div>`).join('');
  }
  if(typeof v==='object'){
    const entries=Object.entries(v);
    if(!entries.length) return '<span class="muted">{}</span>';
    // table.kvt 자체를 .table-scroll로 감싼다 — td 안에 중첩된 결과표(예: 스크리닝 result
    // 배열)가 있으면 auto-layout 테이블이 그 표 너비만큼 통째로 자라 화면 밖으로 삐져나오는
    // 문제가 있었다. 최상위 배열-표(위 분기)와 동일한 패턴으로 가로 스크롤을 강제한다.
    return `<div class="table-scroll"><table class="kvt"><tbody>${entries.map(([k,val])=>
      `<tr><th>${esc(k)}</th><td>${renderKV(val)}</td></tr>`).join('')}</tbody></table></div>`;
  }
  return esc(v);
}

function renderEvidenceCode(sql, code){
  let html='';
  if(sql) html+=`<div class="meta" style="margin-top:10px">SQL</div><pre class="sql">${esc(sql)}</pre>`;
  if(code) html+=`<div class="meta" style="margin-top:10px">Python</div><pre class="sql">${esc(code)}</pre>`;
  return html;
}

function renderDomainEvidence(ev){
  if(!ev || typeof ev!=='object' || !Object.keys(ev).length) return '';
  return Object.entries(ev).map(([domain,result])=>
    `<div class="evi-card"><div class="evi-head">📦 ${esc(DOMAIN_LABEL[domain]||domain)} 도메인 · 원본 데이터(가공 없음)</div>${renderKV(result)}</div>`
  ).join('');
}

// 오른쪽 패널: 실패면 사유, 성공이면 sql/code 우선(있을 때) 아니면 domain_evidence(저장된 함수/정형 도메인 근거).
function renderRight(turn){
  const body=document.getElementById('progressBody');
  if(!turn){ body.innerHTML='<div class="muted">대기 중</div>'; return; }
  if(turn.status!=='success'){
    body.innerHTML=`<div class="tree-fail">⚠ 실패: ${esc(turn.error||'')}</div>`;
    return;
  }
  const code=renderEvidenceCode(turn.sql, turn.code);
  let html='<div class="tree-done">✓ 완료</div>';
  if(code){
    html+=code;
  }else{
    const de=renderDomainEvidence(turn.domain_evidence);
    html+= de || '<div class="muted">이 턴은 표시할 근거 데이터가 없습니다.</div>';
  }
  body.innerHTML=html;
}

function renderCenter(turn){
  const box=document.getElementById('topAnswerBody');
  const label=document.querySelector('#topAnswer .label');
  if(!turn){
    label.textContent='최종 답변';
    box.innerHTML='<div class="muted">아직 질문이 없습니다. 아래 입력창에 질문을 적어보세요. 초기화 전까지는 이어지는 모든 질문이 직전 결과를 이어받아 처리됩니다.</div>';
    return;
  }
  label.textContent = turn.status==='success' ? '최종 답변' : '실패';
  let html = turn.status==='success'
    ? renderAnswerBody(turn.answer)
    : `<div class="err">${esc(turn.error||'실패')}</div>`;
  if(turn.status==='success' && turn.chart_base64){
    html += `<div class="card" style="margin-top:14px"><b>📈 ${esc(turn.chart_title||'차트')}</b><img class="qchart" src="data:image/png;base64,${turn.chart_base64}" alt="${esc(turn.chart_title||'차트')}"></div>`;
  }
  if(turn.csv_available){
    html+=`<div class="answer-actions"><a class="chip" href="/api/chat/csv?session_id=${encodeURIComponent(sessionId)}&turn_index=${turn._index}" download>⬇ CSV 다운로드</a></div>`;
  }
  box.innerHTML=html;
}

function renderHistoryList(){
  const box=document.getElementById('chatHistory');
  if(!_turns.length){
    box.innerHTML='<div class="hist-empty">지나간 대화가 여기 쌓입니다. 항목을 클릭하면 그 답변을 가운데에서 볼 수 있어요.</div>';
    return;
  }
  box.innerHTML=_turns.map((t,i)=>{
    const ok=t.status==='success';
    const ico=`<span class="hi-ico ${ok?'ok':'fail'}">${ok?'✓':'⚠'}</span>`;
    const active=i===_selected?' active':'';
    return `<button type="button" class="history-item${active}" data-idx="${i}">${ico}<span class="hi-q">${esc(t.question)}</span></button>`;
  }).join('');
  box.querySelectorAll('.history-item').forEach(el=>{
    el.addEventListener('click', ()=>selectTurn(Number(el.dataset.idx)));
  });
}

function selectTurn(i){
  if(i<0 || i>=_turns.length) return;
  _selected=i;
  renderHistoryList();
  const turn={..._turns[i], _index:i};
  renderCenter(turn);
  if(!_live) renderRight(turn);
}

async function loadHistory(selectLatest=true){
  if(!sessionId){
    _turns=[]; _selected=null;
    renderHistoryList(); renderCenter(null);
    if(!_live) renderRight(null);
    return;
  }
  const r = await fetch(`/api/chat/history?session_id=${encodeURIComponent(sessionId)}`);
  const data = await r.json();
  _turns = data.turns||[];
  if(!_turns.length){
    _selected=null;
    renderHistoryList(); renderCenter(null);
    if(!_live) renderRight(null);
    return;
  }
  if(selectLatest || _selected==null || _selected>=_turns.length) _selected=_turns.length-1;
  renderHistoryList();
  const turn={..._turns[_selected], _index:_selected};
  renderCenter(turn);
  if(!_live) renderRight(turn);
}

let _chatES=null;

function sendQuestion(){
  const ta=document.getElementById('q');
  const question=ta.value.trim();
  if(!question) return;
  const sendBtn=document.getElementById('sendBtn');
  const progressBody=document.getElementById('progressBody');
  sendBtn.disabled=true; ta.disabled=true;
  _live=true;
  progressBody.innerHTML='';

  if(_chatES){ _chatES.close(); _chatES=null; }

  const params=new URLSearchParams({question});
  if(sessionId) params.set('session_id', sessionId);
  const model=document.getElementById('modelSel').value;
  if(model) params.set('model', model);
  _chatES=new EventSource(`/api/chat/stream?${params.toString()}`);

  const finish=()=>{
    if(_chatES){ _chatES.close(); _chatES=null; }
    _live=false;
    sendBtn.disabled=false; ta.disabled=false; ta.focus();
  };

  // 기본(data:) 프레임 = 진행 단계 메시지. 도착 즉시 오른쪽 패널에 실시간으로 쌓인다(AC13).
  _chatES.onmessage=(e)=>{
    const ev=JSON.parse(e.data);
    if(ev.step){
      progressBody.insertAdjacentHTML('beforeend', `<div class="meta"><span class="spinner"></span> ${esc(ev.step)}</div>`);
      progressBody.scrollTop = progressBody.scrollHeight;
    }
  };
  _chatES.addEventListener('done', async (e)=>{
    const data=JSON.parse(e.data);
    if(data.session_id){
      sessionId=data.session_id;
      localStorage.setItem(SID_KEY, sessionId);
    }
    ta.value='';
    finish();                 // _live=false 로 풀어야 loadHistory 가 근거 데이터를 오른쪽에 렌더한다
    await loadHistory(true);   // 최신 턴을 선택 → 가운데 답변 + 오른쪽 근거(domain_evidence 포함) 표시
  });
  _chatES.addEventListener('fail',(e)=>{
    const data=JSON.parse(e.data||'{}');
    progressBody.innerHTML=`<div class="tree-fail">⚠ ${esc(data.message||'스트림 오류')}</div>`;
    finish();
  });
  _chatES.onerror=()=>{
    if(_chatES && _chatES.readyState===EventSource.CLOSED) return;  // 이미 done/fail로 정상 종료됨
    progressBody.innerHTML='<div class="tree-fail">⚠ 연결이 끊겼습니다.</div>';
    finish();
  };
}

document.getElementById('sendBtn').addEventListener('click', sendQuestion);
document.getElementById('q').addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); sendQuestion(); }
});

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  if(sessionId){
    await fetch('/api/chat/reset',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId}),
    });
  }
  _live=false;
  await loadHistory(true);
});

loadModels();
loadHistory();
loadMacro();
setInterval(loadMacro, 60000);  // 1분마다 자동 갱신(코스피/코스닥·환율·해외지수 새로고침 없이 반영)
</script>
