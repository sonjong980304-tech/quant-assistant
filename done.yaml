# dart-text2sql-wiki 완성도 게이트(Definition-of-Done) 선언.
#
# 완성도 = 3축 복합. 전부 통과해야 "DONE"(엄격 all-pass).
#   ① 기능   : 정상 입력에서 NL→SQL→결과가 끝까지 도는가 (통합테스트)
#   ② 안정성 : 이상 입력(빈/엉뚱한 질문·없는 회사·문법오류 SQL)에도 안 죽는가 (엣지케이스)
#   ③ 성능   : 정답셋 EX(실행정확도)가 목표치 이상인가 (기존 eval, 오프라인)
#
# 러너(donegate/)는 이 파일만 읽고 command 경계로만 각 축을 실행·판정한다.
# dart의 src/ 를 절대 import하지 않는다(분리 불변식, AC11).
project: dart-text2sql-wiki

env:
  mode: fixture   # 고정 픽스처(오프라인) 우선 — 결정론·무비용·재현 보장
  # mode: llm     # LLM 모드 전환 시 재현성 대신 실제 EX(~74%) 측정 가능(비용 발생, 게이트 기본값 아님)

axes:
  기능:
    - name: 자연어→SQL 조회 파이프라인 (통합)
      command: "python -m pytest tests/test_integration.py -q"
      pass: exit_zero

  안정성:
    - name: 이상입력 크래시 없음 (엣지케이스)
      command: "python -m pytest tests/test_edge.py -q"
      pass: exit_zero

  성능:
    - name: 실행정확도(EX, 오프라인 휴리스틱)
      # --offline: LLM 강제 비활성화(휴리스틱 폴백만) → 결정론.
      # --json   : 러너가 파싱할 리포트 dict를 stdout에 출력.
      # run_evaluation은 항상 격리된 DB 사본에서 실행되므로 사용자 DB(wiki 기록)는
      # 건드리지 않는다(별도 플래그 불필요).
      command: "python cli.py eval --offline --json"
      pass: threshold
      metric: ex
      extract: "execution_accuracy.ex_pct"   # stdout JSON의 dot-path
      # ── 목표치 근거 ─────────────────────────────────────────────
      # 오프라인(휴리스틱) 실측 EX = 38.2% (13/34 applicable, 결정론).
      #   * 왜 74%가 아닌가: 74%는 LLM(gpt-5.4-mini) 모드의 EX다. 게이트는 결정론·
      #     무비용을 위해 --offline(휴리스틱 폴백)으로 돈다. 휴리스틱은 ORDER BY..LIMIT
      #     한 틀만 만들어 단순 정렬 질의만 맞히므로(집계/서브쿼리/복수조건 불가) EX가 낮다.
      #   * applicable이 50이 아닌 34인 이유: diagnose 노드가 빈결과/이상 결과(정답셋
      #     13/32/35 3문항 포함, 현재 DB에서 gold가 빈 결과)를 human_review로 보내
      #     eval까지 도달하지 못한 항목은 EX 분모에서 제외된다.
      # 임계는 실측 38.2%에서 ~3pt 안정 마진을 두어 35.0으로 설정.
      threshold: ">= 35.0"
